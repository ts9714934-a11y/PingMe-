<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="home-bg">

<div class="header">
<div class="logo-small">ChatApp</div>
</div>

<div class="search-box">
<input type="text" placeholder="Search" onkeyup="searchChat()">
</div>

<div class="chat-list" id="chatList"></div>

<div class="plus-btn" onclick="openAddUser()">+</div>

<div class="add-user-popup" id="addUserPopup">
<div class="add-user-box">

<h3>Start Chat</h3>
<input type="text" id="phoneInput" placeholder="Enter phone number">
<button onclick="startChat()">Start</button>
<button onclick="closeAddUser()">Cancel</button>

</div>
</div>

<div class="popup" id="deleteChatPopup">
<div class="popup-box">
<h3>Delete chat?</h3>
<div class="popup-btns">
<button onclick="closeDeleteChat()">Cancel</button>
<button onclick="confirmDeleteChat()">Delete</button>
</div>
</div>
</div>

<!-- Supabase CDN + Config -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = https://hfslxoltqichhqmjrrzi.supabase.co ; // Project ID
const SUPABASE_ANON_KEY = "sb_publishable_u8X4qG7xNn34feiFu7wJxA_VdTamnO6"; // Publishable Key
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const userId = localStorage.getItem("pingme_user"); // logged-in user ID

async function loadChats(){
  const chatList = document.getElementById("chatList");
  chatList.innerHTML="";

  // fetch chats where user is a member
  const { data: chats, error } = await supabase
    .from('chats')
    .select('*')
    .or(`user1_id.eq.${userId},user2_id.eq.${userId}`);

  if(error) return console.error(error);

  chats.forEach(c=>{
    let name=c.user1_id===userId?c.user2_id:c.user1_id;
    let lastMsg=c.last_message||"";

    const div = document.createElement("div");
    div.className="chat-item";
    div.setAttribute("data-user", name);
    div.innerHTML=`
      <div class="avatar">${name.charAt(0).toUpperCase()}</div>
      <div class="chat-info">
        <div class="chat-name">${name}</div>
        <div class="chat-last">${lastMsg}</div>
      </div>
    `;
    div.onclick=()=>{ window.location.href="chat.html?user="+name; };
    chatList.appendChild(div);
  });
}

// Popup & search logic remain same
function openAddUser(){ document.getElementById("addUserPopup").style.display="flex"; }
function closeAddUser(){ document.getElementById("addUserPopup").style.display="none"; }
function startChat(){
  let phone=document.getElementById("phoneInput").value.trim();
  if(!phone) return;
  window.location.href="chat.html?user="+phone;
}

loadChats();
</script>

</body>
</html>

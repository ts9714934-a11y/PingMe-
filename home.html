<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PingMe</title>

<style>

body{
font-family:sans-serif;
margin:0;
background:#fff1f5;
}

.header{
background:#FFD700;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
}

#chatBody{
height:70vh;
overflow-y:auto;
padding:10px;
}

.msg{
padding:10px 15px;
margin:8px;
border-radius:20px;
max-width:70%;
}

.you{
background:#FFD700;
margin-left:auto;
}

.other{
background:#eee;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
padding:10px;
background:#fff;
gap:10px;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:20px;
background:#FFD700;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<span>PingMe</span>

<button onclick="logout()">Logout</button>

</div>

<div id="chatBody"></div>

<div class="bottom">

<input id="msgInput" placeholder="Type message">

<button onclick="sendMsg(new URLSearchParams(window.location.search).get('user'))">
Send
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://hfslxoltqichhqmjrrzi.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_u8X4qG7xNn34feiFu7wJxA_VdTamnO6";

const supabase = supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

async function checkAuth(){

const { data:{session} } = await supabase.auth.getSession();

if(!session){

window.location.href="login.html";
return;

}

}

checkAuth();

// logout
async function logout(){

await supabase.auth.signOut();

window.location.href="login.html";

}

</script>

<script src="script.js"></script>

</body>
</html>

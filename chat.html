<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chat</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="chat-bg">

<div class="chat-header">
<a href="home.html">←</a>
<div class="avatar" id="avatar"></div>
<div><b id="chatName"></b><br><span class="online">online</span></div>
</div>

<div class="chat-body" id="chatBody"></div>

<div class="chat-input">
<input id="msgInput" placeholder="Message">
<button onclick="sendMsg()">Send</button>
</div>

<!-- Supabase CDN + Config -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "hfslxoltqichhqmjrrzi"; // Project ID
const SUPABASE_ANON_KEY = "sb_publishable_u8X4qG7xNn34feiFu7wJxA_VdTamnO6"; // Publishable Key
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const params = new URLSearchParams(window.location.search);
const chatUser = params.get("user");
const userId = localStorage.getItem("pingme_user");

const chatBody = document.getElementById("chatBody");
document.getElementById("chatName").innerText = chatUser;

async function loadMessages(){
  const { data: messages, error } = await supabase
    .from('messages')
    .select('*')
    .or(`sender_id.eq.${userId},receiver_id.eq.${userId}`)
    .order('created_at',{ascending:true});

  if(error) return console.error(error);

  chatBody.innerHTML = "";
  messages.forEach(m=>{
    const div = document.createElement("div");
    div.className = m.sender_id===userId?"msg you":"msg other";
    div.innerText = m.content;
    chatBody.appendChild(div);
  });
  chatBody.scrollTop = chatBody.scrollHeight;
}

async function sendMsg(){
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if(!text) return;

  await supabase.from('messages').insert([{ sender_id: userId, receiver_id: chatUser, content: text }]);
  input.value="";
  loadMessages();
}

loadMessages();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PingMe - Login</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');

body{
background:linear-gradient(#fff,#fff1f5);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:sans-serif;
}

.login-box{
background:#fff;
width:90%;
max-width:400px;
padding:30px;
border-radius:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
gap:20px;
align-items:center;
}

.logo{
font-family:'Pacifico',cursive;
font-size:48px;
color:#FFD700;
}

input{
width:100%;
padding:12px;
border-radius:25px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:#FFD700;
cursor:pointer;
}

.google-btn{
background:#4285F4;
color:#fff;
}
</style>
</head>

<body>

<div class="login-box">

<div class="logo">PingMe</div>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button id="loginBtn">Login</button>

<button class="google-btn" id="googleBtn">
Login with Google
</button>

</div>

<!-- Clerk SDK -->
<script
async
crossorigin="anonymous"
data-clerk-frontend-api="capital-dassie-38.clerk.accounts.dev"
src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js">
</script>

<script>

window.addEventListener("load", async () => {

await Clerk.load({
frontendApi: "capital-dassie-38.clerk.accounts.dev"
});

if (Clerk.user) {
window.location.href = "home.html";
}

// Email login
document.getElementById("loginBtn").addEventListener("click", async () => {

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

if(!email || !password){
alert("Email aur password bharo");
return;
}

const signIn = await Clerk.client.signIn.create({
identifier: email,
password: password
});

if(signIn.status === "complete"){
window.location.href = "home.html";
}

});

// Google login
document.getElementById("googleBtn").addEventListener("click", async () => {

await Clerk.client.signIn.authenticateWithRedirect({
strategy: "oauth_google",
redirectUrl: window.location.origin + "/home.html"
});

});

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PingMe - Login</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');

body{
background:linear-gradient(#fff,#fff1f5);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:sans-serif;
}

.login-box{
background:#fff;
width:90%;
max-width:400px;
padding:30px;
border-radius:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
gap:20px;
align-items:center;
}

.logo{
font-family:'Pacifico',cursive;
font-size:48px;
color:#FFD700;
}

#clerk-login{
width:100%;
}
</style>
</head>

<body>

<div class="login-box">

<div class="logo">PingMe</div>

<!-- Clerk Login Widget -->
<div id="clerk-login"></div>

</div>

<!-- Clerk JS -->
<script
async
crossorigin="anonymous"
data-clerk-frontend-api="capital-dassie-38.clerk.accounts.dev"
src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js">
</script>

<script>

window.addEventListener("load", async () => {

await Clerk.load({
frontendApi: "capital-dassie-38.clerk.accounts.dev"
});

if (Clerk.user) {
window.location.href = "home.html";
}

Clerk.mountSignIn("#clerk-login", {
redirectUrl: "home.html"
});

});

</script>

</body>
</html>
